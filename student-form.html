<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="theme-color" content="#87CEEB">
  <title>Student Form - Kumon DB</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* Timeslot specific styles */
    .timeslots-container { background: #f0f8ff; padding: 0.75rem; border-radius: var(--radius); margin: 0.5rem 0; border: 1px solid #cce5ff; }
    .timeslot-row { display: flex; gap: 0.5rem; align-items: flex-end; margin-bottom: 0.5rem; }
    .timeslot-row > div { flex: 1; }
    .timeslot-row label { font-size: 0.8rem; color: var(--text-light); display: block; margin-bottom: 2px; }
    .remove-ts-btn { background: #dc3545; color: white; border: none; width: 32px; height: 38px; border-radius: var(--radius); cursor: pointer; font-size: 1.2rem; line-height: 1; }
    .remove-ts-btn:hover { opacity: 0.8; }
  </style>
</head>
<body>
  <div id="loadingOverlay" class="loading-overlay">
    <div class="loading-container"><div class="spinner"></div><p class="loading-text">Loading student details</p></div>
  </div>

  <header>
    <h1>✏️ <span id="formTitle">Add Student</span></h1>
    <nav><a href="students.html">← Back to Students</a></nav>
  </header>
  
  <main class="form-container">
    <form id="studentForm">
      <section>
        <h3>Basic Information</h3>
        <div class="form-grid">
          <input type="text" id="studentNumber" placeholder="Student Number (Optional)">
          <input type="text" id="nameEn" placeholder="Name (English) *" required>
          <input type="text" id="nameCn" placeholder="Name (Chinese) *" required>
          <input type="text" id="grade" placeholder="Grade *" required>
          <input type="text" id="school" placeholder="School *" required>
          <input type="text" id="address" placeholder="Address">
          <input type="text" id="nationality" placeholder="Nationality">
          <input type="email" id="email" placeholder="Email">
          <input type="date" id="birthday" placeholder="Birthday">
        </div>
      </section>
      
      <section>
        <h3>Contact Information</h3>
        <div class="form-grid">
          <input type="tel" id="phoneMom" placeholder="Phone (Mom)">
          <input type="tel" id="phoneDad" placeholder="Phone (Dad)">
          <input type="tel" id="phoneOwn" placeholder="Phone (Student)">
        </div>
      </section>
      
      <section>
        <h3>Subjects (Max 3)</h3>
        <div id="subjectsContainer"></div>
        <button type="button" id="addSubjectBtn" class="secondary">+ Add Subject</button>
        <p class="hint">💡 Note: English ERP & EFL cannot be together. Each subject supports up to 6 timeslots.</p>
      </section>
      
      <div class="form-actions">
        <button type="submit" class="primary">💾 Save Student</button>
        <button type="button" onclick="window.location.href='students.html'">Cancel</button>
      </div>
    </form>
  </main>

  <script type="module" src="student-form.js"></script>
</body>
</html>
