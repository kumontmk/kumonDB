<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance - Kumon DB</title>
    <link rel="stylesheet" href="style.css">
    <!-- QR Scanner Library -->
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
</head>
<body>
    <header>
        <h1>📅 Attendance Management</h1>
        <nav>
            <a href="dashboard.html">← Back to Dashboard</a>
            <button id="logoutBtn" onclick="window.location.href='login.html'">Logout</button>
        </nav>
    </header>

    <main class="students-page">
        <div class="controls">
            <label for="attendanceDate" style="align-self:center; font-weight:bold;">Date:</label>
            <input type="date" id="attendanceDate" style="max-width:200px;">
            <button id="scanBtn" class="primary">📷 Scan QR for Attendance</button>
        </div>

        <div class="report-table">
            <table id="attendanceTable">
                <thead>
                    <tr>
                        <th>Subject</th>
                        <th>Chinese Name</th>
                        <th>Nickname</th>
                        <th>Grade</th>
                        <th>School</th>
                        <th>Scheduled Time</th>
                        <th>Check-in Time</th>
                        <th>Status</th>
                        <th>Actions</th> 
                    </tr>
                </thead>
                <tbody id="attendanceBody">
                    <tr><td colspan="9" class="text-center">Loading attendance...</td></tr>
                </tbody>
            </table>
        </div>
    </main>

    <!-- QR Scanner Modal -->
    <div id="scanModal" class="modal hidden">
        <div class="modal-content">
            <span id="closeScanModal">&times;</span>
            <h2>📷 Scan Student QR</h2>
            <div id="qr-reader" style="width: 100%; max-width: 300px; margin: 1rem auto;"></div>
            <p id="scanStatus">Point camera at QR code...</p>
        </div>
    </div>

    <!-- Attendance Confirmation Modal -->
    <div id="confirmModal" class="modal hidden">
        <div class="modal-content">
            <h2>✅ Confirm Attendance</h2>
            <div id="studentInfo" style="margin-bottom:1rem;"></div>
            <div id="subjectCheckboxes" style="text-align:left; max-height: 300px; overflow-y:auto;"></div>
            <div style="margin-top:1rem; display:flex; gap:0.5rem; justify-content:center;">
                <button id="confirmAttendanceBtn" class="primary">Confirm Attendance</button>
                <button id="cancelConfirmBtn" class="secondary">Cancel</button>
            </div>
        </div>
    </div>

    <script type="module" src="attendance.js"></script>
</body>
</html>
