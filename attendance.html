<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="theme-color" content="#87CEEB">
  <title>Attendance - Kumon DB</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="page-loader">
    <div class="spinner"></div>
  </div>

  <header>
    <h1>📅 Attendance Management</h1>
    <nav>
      <a href="dashboard.html">← Back to Dashboard</a>
      <button id="logoutBtn">Logout</button>
    </nav>
  </header>

  <main class="students-page">
    <!-- 🆕 ATTENDANCE CONTROLS - Inline Layout -->
    <div class="attendance-controls">
      <div class="control-group">
        <label for="attendanceDate" class="control-label">📅 Date</label>
        <input type="date" id="attendanceDate" class="day-select">
      </div>

      <div class="control-group search-group">
        <label for="attendanceSearch" class="control-label">🔍 Search Student</label>
        <div class="search-wrapper">
          <span class="search-icon">🔍</span>
          <input type="text" id="attendanceSearch" placeholder="Name, nickname, subject, grade...">
          <button type="button" class="clear-search hidden" id="clearSearch" title="Clear">×</button>
        </div>
      </div>

      <button id="scanBtn" class="scan-btn">
        <span class="scan-icon">📷</span>
        <span class="scan-text">Scan QR</span>
      </button>
    </div>

    <div class="report-table">
      <table>
        <thead>
          <tr>
            <th>Subject</th>
            <th>Chinese Name</th>
            <th>Nickname</th>
            <th>Grade</th>
            <th>School</th>
            <th>Scheduled Time</th>
            <th>Check-in Time</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="attendanceBody">
          <tr><td colspan="9" class="text-center">Loading attendance...</td></tr>
        </tbody>
      </table>
    </div>

    <p id="searchResultsCount" class="hint hidden" style="margin-top: 0.75rem; text-align: center;"></p>
  </main>

  <!-- Scan Modal -->
  <div id="scanModal" class="modal hidden">
    <div class="modal-content">
      <span id="closeScanModal">×</span>
      <h2>📷 Scan Student QR</h2>
      <div id="qr-reader" style="width: 100%; margin: 1rem 0;"></div>
      <p id="scanStatus" class="text-center">Point camera at QR code...</p>
    </div>
  </div>

  <!-- Confirm Modal -->
  <div id="confirmModal" class="modal hidden">
    <div class="modal-content">
      <h2>✅ Confirm Attendance</h2>
      <div id="studentInfo" style="margin: 1rem 0;"></div>
      <div id="subjectCheckboxes" style="text-align: left; margin: 1rem 0;"></div>
      <div style="display: flex; gap: 0.5rem; justify-content: center; margin-top: 1rem;">
        <button id="confirmAttendanceBtn" class="primary">Confirm Attendance</button>
        <button id="cancelConfirmBtn" class="secondary">Cancel</button>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
  <script type="module" src="attendance.js"></script>
  <script type="module">
    document.getElementById('logoutBtn').addEventListener('click', () => {
      sessionStorage.removeItem('kumonAuth');
      window.location.href = 'index.html';
    });
  </script>
</body>
</html>
